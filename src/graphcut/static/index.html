<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GraphCut — Local-first video editor with automation-first workflow">
    <title>GraphCut Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/editor.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
            <h1>GraphCut</h1>
        </div>
        <div class="header-controls">
            <span id="save-status">All changes saved</span>
        </div>
    </header>

    <main class="editor-grid">
        <!-- Left Sidebar: Media Management -->
        <aside class="left-panel">
            <div class="panel-section source-panel">
                <div class="section-header">
                    <h2>Library</h2>
                    <button class="btn btn-icon btn-sm" id="btn-add-source" title="Import Media">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
                <div class="tabs tabs-subpanel">
                    <button class="tab-btn active" data-library-tab="media">Media</button>
                    <button class="tab-btn" data-library-tab="effects">Effects</button>
                </div>
                <div class="source-list" id="source-list">
                    <!-- Source items injected here -->
                </div>
                <div class="source-list" id="effects-list" style="display:none;">
                    <!-- Effects injected here -->
                </div>
            </div>
        </aside>

        <!-- Center: Primary Interaction Surface -->
        <section class="center-panel">
            <div class="preview-panel" id="preview-container">
                <div class="placeholder-preview">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:0.3">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <span>No Preview Available</span>
                    <button class="btn btn-primary mt-sm" id="btn-render-preview">Render Preview</button>
                </div>
                <!-- <video> injected when preview rendered -->
            </div>
            
            <div class="transcript-panel">
                <div class="panel-toolbar">
                    <h2>Transcript Editor</h2>
                    <div class="toolbar-actions">
                        <button class="btn btn-sm btn-outline" id="btn-clear-cuts">Clear Cuts</button>
                        <button class="btn btn-sm btn-primary" id="btn-apply-cuts">Apply Cuts</button>
                    </div>
                </div>
                <div class="transcript-content" id="transcript-content">
                    <div class="empty-state">Select a clip or run transcription to edit text.</div>
                </div>
            </div>
        </section>

        <!-- Right Sidebar: Configs & Export -->
        <aside class="right-panel">
            <div class="tabs">
                <button class="tab-btn active" data-tab="audio">Audio</button>
                <button class="tab-btn" data-tab="overlays">Overlays</button>
                <button class="tab-btn" data-tab="scenes">Scenes</button>
                <button class="tab-btn" data-tab="export">Export</button>
            </div>
            
            <div class="tab-content active" id="tab-audio">
                <!-- Audio settings injected here -->
            </div>
            
            <div class="tab-content" id="tab-overlays">
                <!-- Overlays injected here -->
            </div>

            <div class="tab-content" id="tab-scenes">
                <!-- Scenes injected here -->
            </div>
            
            <div class="tab-content" id="tab-export">
                <!-- Export controls injected here -->
            </div>
        </aside>

        <section class="bottom-panel">
            <div class="panel-section clip-panel">
                <div class="section-header">
                    <h2>Timeline</h2>
                    <div style="display:flex; align-items:center; gap:10px; min-width:180px;">
                        <label for="timeline-zoom" style="font-size:0.68rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;">Zoom</label>
                        <input type="range" id="timeline-zoom" min="0.75" max="1.6" step="0.05" value="1">
                    </div>
                </div>
                <div class="clip-list" id="clip-list">
                    <!-- Clip timeline injected here -->
                </div>
            </div>
        </section>
    </main>

    <footer class="app-footer" id="app-footer">
        <div class="status-bar">
            Ready
        </div>
        <div class="progress-container" style="display: none;" id="global-progress">
            <div class="progress-text" id="progress-label">Rendering... 0%</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="progress-eta" id="progress-eta">ETA: --:--</div>
        </div>
    </footer>

    <div class="modal-root" id="trim-modal-root" style="display:none;">
        <div class="modal-backdrop" data-modal-close="1"></div>
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title" id="trim-modal-title">Trim</div>
                <button class="btn btn-sm btn-icon" id="trim-modal-close" title="Close">&times;</button>
            </div>
            <div class="modal-body" id="trim-modal-body"></div>
        </div>
    </div>

    <!-- Modules -->
    <script type="module" src="/js/api.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
